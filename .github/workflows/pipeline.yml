name: Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gerar artefato
        run: |
          mkdir dist
          cp app.py dist/
          cp requirements.txt dist/

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

  deploy:
    name: Deploy Simulado
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: deploy_package

      - name: Simular deploy
        run: |
          echo "Iniciando deploy..."
          ls -la deploy_package
          echo "Deploy realizado com sucesso."